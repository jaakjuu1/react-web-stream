name: Build GHCR Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build app image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image and push on main
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_LIVEKIT_URL=${{ secrets.VITE_LIVEKIT_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy explicit SHA tag
        env:
          HOST: ${{ secrets.HOSTINGER_DEPLOY_HOST }}
          PORT: ${{ secrets.HOSTINGER_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.HOSTINGER_DEPLOY_USER }}
          SSH_KEY: ${{ secrets.HOSTINGER_DEPLOY_SSH_KEY }}
          STACK: streams-records
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          umask 077
          echo "$SSH_KEY" > ~/.ssh/hostinger_deploy
          chmod 600 ~/.ssh/hostinger_deploy

          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -p "$PORT" "$HOST" >> ~/.ssh/known_hosts; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "ssh-keyscan failed after $attempt attempts" >&2
              exit 1
            fi
            sleep 5
          done

          for attempt in 1 2 3; do
            if ssh -i ~/.ssh/hostinger_deploy -p "$PORT"               -o IdentitiesOnly=yes               -o StrictHostKeyChecking=yes               -o ConnectTimeout=20               "$DEPLOY_USER@$HOST" "github-deploy $STACK sha-${GITHUB_SHA}"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "deploy SSH command failed after $attempt attempts" >&2
              exit 1
            fi
            sleep 15
          done
