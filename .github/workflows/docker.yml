name: Build GHCR Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build app image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image and push on main
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_LIVEKIT_URL=${{ secrets.VITE_LIVEKIT_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy explicit SHA tag
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK_TOKEN }}
          STACK: streams-records
        run: |
          set -euo pipefail
          payload="{\"tag\":\"sha-${GITHUB_SHA}\"}"

          for attempt in 1 2 3; do
            status=$(curl -sS -o deploy-response.json -w '%{http_code}' \
              --connect-timeout 20 \
              --max-time 1900 \
              -X POST "$DEPLOY_WEBHOOK_URL/deploy/$STACK" \
              -H "authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
              -H 'content-type: application/json' \
              -d "$payload" || true)

            if [ "$status" = "200" ]; then
              python3 -c 'import json; data=json.load(open("deploy-response.json", encoding="utf-8")); print(data.get("output", "")); raise SystemExit(0 if data.get("ok") else 1)'
              break
            fi

            echo "deploy webhook returned HTTP $status" >&2
            sed -n '1,120p' deploy-response.json >&2 || true
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 20
          done
